<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rétroviseur</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="room-page">

  <!-- Header -->
  <header id="room-header">
    <div class="header-left">
      <a href="/" class="logo-sm" aria-label="Home"><svg aria-hidden="true" viewBox="0 0 80 60" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="72" height="38" rx="10"/><line x1="40" y1="42" x2="40" y2="54"/><line x1="22" y1="54" x2="58" y2="54"/></svg></a>
      <div>
        <div id="room-title" class="room-title">Loading…</div>
        <div class="room-meta">
          <span id="room-code-label" class="room-code-badge"></span>
          <button id="copy-btn" class="btn-icon" title="Copy invite link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy link
          </button>
          <span id="votes-counter" class="votes-counter hidden"></span>
        </div>
      </div>
    </div>
    <div class="header-right">
      <div id="sort-control">
        <button id="sort-btn" class="btn-icon">⇅ Date</button>
      </div>
      <div id="participants-bar" class="participants-bar"></div>
      <div id="facilitator-controls" class="facilitator-controls hidden">
        <button id="markdown-btn" class="btn btn-sm btn-ghost">🔤 Markdown on</button>
        <button id="blur-btn" class="btn btn-sm btn-ghost">🫣 Blur cards</button>
        <button id="reveal-btn" class="btn btn-sm btn-ghost">👁 Show authors</button>
        <button id="clear-votes-btn" class="btn btn-sm btn-ghost">🗑 Clear votes</button>
        <button id="delegate-btn" class="btn btn-sm btn-ghost">👑 Hand over</button>
      </div>
    </div>
  </header>

  <!-- Columns -->
  <main id="columns-container" class="columns-container"></main>

  <!-- Toast -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Join name modal (shown when accessing via link) -->
  <div id="join-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-logo"><svg aria-hidden="true" viewBox="0 0 80 60" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="72" height="38" rx="10"/><line x1="40" y1="42" x2="40" y2="54"/><line x1="22" y1="54" x2="58" y2="54"/></svg></div>
      <h2>Join the retrospective</h2>
      <p id="modal-room-name" class="modal-subtitle"></p>
      <form id="join-modal-form">
        <div class="field">
          <label for="modal-name">Your name</label>
          <input id="modal-name" type="text" placeholder="e.g. Alice" maxlength="30" autocomplete="off" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Join</button>
      </form>
      <p id="modal-error" class="error-msg"></p>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
  <script src="room.js"></script>
</body>
</html>
